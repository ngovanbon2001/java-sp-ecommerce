version: '3'
services:
  postgres:
    image: postgres:16
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: tuyennt
      POSTGRES_PASSWORD: tuyennt
      POSTGRES_DB: ihanoi
    ports:
      - "5432:5432"
    volumes:
      - ./pgdata:/var/lib/postgresql/data