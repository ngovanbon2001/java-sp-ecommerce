version: '3'
services:
  mysql:
    image: mysql:8
    container_name: mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: ecommerce
      MYSQL_USER: root
      MYSQL_PASSWORD: root 
    ports:
      - "3306:3306"
    volumes:
      - ./mysql-data:/var/lib/mysql